services:
  db:
    image: postgres:16
    container_name: task-postgres-compose
    environment:
      POSTGRES_USER: task_user
      POSTGRES_PASSWORD: task_password
      POSTGRES_DB: task_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_user -d task_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: task-fastapi-compose
    environment:
      DATABASE_URL: postgresql+psycopg://task_user:task_password@db:5432/task_db
    ports:
      - "8005:8000"
    depends_on:
      db:
        condition: service_healthy